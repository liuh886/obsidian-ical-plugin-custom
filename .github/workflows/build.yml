name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/checkout@v3
        with:
          node-version: "16"

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: obsidian-ical-plugin
          path: |
            main.js
            manifest.json
            styles.css
